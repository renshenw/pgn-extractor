<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title Extractor</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>PGN Extractor</h1>
        </header>

        <main>
            <div class="options-panel">
                <div class="option-row">
                    <span class="toggle-label">Keep all the moves</span>
                    <label class="switch">
                        <input type="checkbox" id="keepMovesCheckbox">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div class="option-row">
                    <span class="toggle-label">Append to file</span>
                    <label class="switch">
                        <input type="checkbox" id="appendToFileCheckbox">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div id="fileSelectorContainer" class="file-selector-row hidden">
                    <button id="selectFileBtn" class="secondary-btn mini-btn">Select File</button>
                    <span id="fileNameDisplay" class="file-name">No file selected</span>
                </div>
            </div>

            <div class="actions-container">
                <button id="getTitleBtn" class="primary-btn">Get PGN</button>
                <button id="resetBtn" class="secondary-btn">Reset Counter</button>
            </div>

            <div class="input-container">
                <textarea id="titleOutput" readonly placeholder="Click the button to get PGN" rows="6"></textarea>
            </div>
        </main>
    </div>
    <script src="chess.js"></script>
    <script src="popup.js"></script>
</body>

</html>
